<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="dse" x="-4%" y="-4%" width="108%" height="108%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
    <marker id="ae" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748b"/></marker>
  </defs>
  <rect width="640" height="380" rx="16" fill="#fafafa"/>

  <!-- Row 1: Simple -->
  <rect x="20" y="20" width="180" height="50" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" filter="url(#dse)"/>
  <text x="35" y="42" style="font-size:12px; fill:#334155; font-weight:700">Simple Task</text>
  <text x="35" y="58" style="font-size:10px; fill:#64748b">1 person is enough</text>

  <line x1="200" y1="45" x2="240" y2="45" stroke="#64748b" stroke-width="1.5" marker-end="url(#ae)"/>

  <rect x="240" y="20" width="160" height="50" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="255" y="42" style="font-size:12px; fill:#334155; font-weight:600">Claude Code Session</text>
  <text x="255" y="58" style="font-size:10px; fill:#64748b">Single instance</text>

  <!-- Row 2: Parallel independent -->
  <rect x="20" y="90" width="180" height="50" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#dse)"/>
  <text x="35" y="112" style="font-size:12px; fill:#3730a3; font-weight:700">Parallel + Independent</text>
  <text x="35" y="128" style="font-size:10px; fill:#6366f1">Only results needed</text>

  <line x1="200" y1="115" x2="240" y2="115" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ae)"/>

  <rect x="240" y="90" width="160" height="50" rx="10" fill="#6366f1" filter="url(#dse)"/>
  <text x="275" y="112" style="font-size:12px; fill:#fff; font-weight:600">Sub-Agent</text>
  <text x="260" y="128" style="font-size:10px; fill:#c7d2fe">Results returned upward</text>

  <!-- Row 3: Collaboration needed -->
  <rect x="20" y="160" width="180" height="50" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#dse)"/>
  <text x="35" y="182" style="font-size:12px; fill:#9d174d; font-weight:700">Collaboration Needed</text>
  <text x="35" y="198" style="font-size:10px; fill:#ec4899">Peers must communicate</text>

  <line x1="200" y1="185" x2="240" y2="185" stroke="#ec4899" stroke-width="1.5" marker-end="url(#ae)"/>

  <rect x="240" y="160" width="160" height="50" rx="10" fill="#ec4899" filter="url(#dse)"/>
  <text x="273" y="182" style="font-size:12px; fill:#fff; font-weight:600">Agent Team</text>
  <text x="258" y="198" style="font-size:10px; fill:#fce7f3">Shared task list + mailbox</text>

  <!-- Row 4: Production -->
  <rect x="20" y="230" width="180" height="50" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#dse)"/>
  <text x="35" y="252" style="font-size:12px; fill:#166534; font-weight:700">Production Automation</text>
  <text x="35" y="268" style="font-size:10px; fill:#22c55e">CI/CD, custom apps</text>

  <line x1="200" y1="255" x2="240" y2="255" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ae)"/>

  <rect x="240" y="230" width="160" height="50" rx="10" fill="#22c55e" filter="url(#dse)"/>
  <text x="255" y="252" style="font-size:12px; fill:#fff; font-weight:600">Claude Agent SDK</text>
  <text x="255" y="268" style="font-size:10px; fill:#dcfce7">Python / TypeScript</text>

  <!-- Row 5: Multi-channel -->
  <rect x="20" y="300" width="180" height="50" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" filter="url(#dse)"/>
  <text x="35" y="322" style="font-size:12px; fill:#581c87; font-weight:700">Multi-Channel</text>
  <text x="35" y="338" style="font-size:10px; fill:#9333ea">Telegram, Slack, Discord...</text>

  <line x1="200" y1="325" x2="240" y2="325" stroke="#9333ea" stroke-width="1.5" marker-end="url(#ae)"/>

  <rect x="240" y="300" width="160" height="50" rx="10" fill="#9333ea" filter="url(#dse)"/>
  <text x="278" y="322" style="font-size:12px; fill:#fff; font-weight:600">OpenClaw</text>
  <text x="258" y="338" style="font-size:10px; fill:#e9d5ff">Local Gateway + multi-LLM</text>

  <!-- Cost tip -->
  <rect x="430" y="90" width="190" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#dse)"/>
  <text x="450" y="115" style="font-size:12px; fill:#1a1a2e; font-weight:700">Cost-Sensitive?</text>
  <text x="450" y="138" style="font-size:11px; fill:#334155">Use Model Tiering:</text>
  <rect x="450" y="148" width="12" height="12" rx="3" fill="#7c3aed"/>
  <text x="470" y="159" style="font-size:10px; fill:#555">Opus — strategy</text>
  <rect x="450" y="166" width="12" height="12" rx="3" fill="#6366f1"/>
  <text x="470" y="177" style="font-size:10px; fill:#555">Sonnet — execution</text>
  <rect x="450" y="184" width="12" height="12" rx="3" fill="#94a3b8"/>
  <text x="470" y="195" style="font-size:10px; fill:#555">Haiku — simple Q&A</text>

  <!-- Arrow from sub-agent and agent team to cost tip -->
  <line x1="400" y1="115" x2="428" y2="130" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="400" y1="185" x2="428" y2="175" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>
</svg>