<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow1" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <style>
      .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
      .label { font-size: 13px; fill: #333; }
      .label-bold { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
      .label-small { font-size: 11px; fill: #666; }
      .label-white { font-size: 13px; fill: #fff; font-weight: 600; }
      .label-white-sm { font-size: 11px; fill: #ffffffcc; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="460" rx="16" fill="#fafafa"/>

  <!-- Node box -->
  <rect x="20" y="16" width="680" height="428" rx="14" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="40" y="42" class="label-small">Node: MacBook (or $5 VPS)</text>

  <!-- Gateway box -->
  <rect x="50" y="60" width="620" height="370" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="75" y="88" class="title">Gateway</text>
  <text x="195" y="88" class="label-small">ws://127.0.0.1:18789</text>

  <!-- Telegram channel -->
  <rect x="80" y="110" width="160" height="70" rx="10" fill="#0088cc" filter="url(#shadow1)"/>
  <text x="115" y="140" class="label-white">Telegram</text>
  <text x="110" y="160" class="label-white-sm">1 Bot</text>

  <!-- Arrow: Telegram -> Binding -->
  <line x1="240" y1="145" x2="300" y2="145" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Binding -->
  <rect x="300" y="120" width="120" height="50" rx="25" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="325" y="150" class="label-bold">Binding</text>

  <!-- Arrow: Binding -> Agent -->
  <line x1="420" y1="145" x2="480" y2="145" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Agent "main" box -->
  <rect x="480" y="100" width="170" height="90" rx="12" fill="#6366f1" filter="url(#shadow1)"/>
  <text x="510" y="130" class="label-white">Agent "main"</text>
  <text x="510" y="150" class="label-white-sm">claude-sonnet-4-6</text>
  <text x="510" y="170" class="label-white-sm">SOUL.md: personal assistant</text>

  <!-- Agent details -->
  <rect x="80" y="210" width="260" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="105" y="238" class="label-bold">Agent "main" Details</text>

  <!-- SOUL.md -->
  <rect x="100" y="252" width="100" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="117" y="273" class="label" style="font-size:12px">SOUL.md</text>

  <!-- HEARTBEAT -->
  <rect x="215" y="252" width="110" height="32" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="223" y="273" class="label" style="font-size:12px">HEARTBEAT</text>

  <!-- Skills row -->
  <text x="105" y="310" class="label-small">Skills:</text>
  <rect x="100" y="318" width="65" height="28" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="111" y="337" class="label" style="font-size:11px">gmail</text>
  <rect x="175" y="318" width="80" height="28" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="185" y="337" class="label" style="font-size:11px">calendar</text>
  <rect x="265" y="318" width="72" height="28" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="275" y="337" class="label" style="font-size:11px">weather</text>

  <!-- Session -->
  <text x="105" y="375" class="label-small">Session:</text>
  <rect x="100" y="382" width="225" height="22" rx="4" fill="#f1f5f9"/>
  <text x="110" y="398" class="label" style="font-size:11px; font-family:monospace">agent:main:telegram (single)</text>

  <!-- Sessions box -->
  <rect x="380" y="210" width="280" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="405" y="238" class="label-bold">Cron Jobs</text>

  <!-- Cron items -->
  <rect x="400" y="252" width="240" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="415" y="267" class="label" style="font-size:11px">morning-briefing</text>
  <text x="415" y="280" class="label-small" style="font-size:10px">0 7 * * * (Seoul)</text>
  <circle cx="630" cy="270" r="4" fill="#22c55e"/>

  <rect x="400" y="296" width="240" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="415" y="311" class="label" style="font-size:11px">evening-wrap</text>
  <text x="415" y="324" class="label-small" style="font-size:10px">0 18 * * 1-5</text>
  <circle cx="630" cy="314" r="4" fill="#22c55e"/>

  <rect x="400" y="340" width="240" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="415" y="355" class="label" style="font-size:11px">weekly-review</text>
  <text x="415" y="368" class="label-small" style="font-size:10px">0 10 * * 0</text>
  <circle cx="630" cy="358" r="4" fill="#22c55e"/>

  <!-- Cost badge -->
  <rect x="400" y="388" width="240" height="28" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="460" y="407" class="label" style="font-size:12px; fill:#15803d">$5 ~ 15 / month</text>
</svg>