<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="dsa" x="-4%" y="-4%" width="108%" height="108%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
    <marker id="aa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6366f1"/></marker>
  </defs>
  <rect width="620" height="420" rx="16" fill="#fafafa"/>

  <!-- User Layer -->
  <rect x="30" y="14" width="560" height="60" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#dsa)"/>
  <text x="230" y="36" style="font-size:13px; font-weight:700; fill:#3730a3">User Layer</text>
  <rect x="45" y="44" width="65" height="22" rx="6" fill="#6366f1"><title>WhatsApp</title></rect>
  <text x="50" y="60" style="font-size:10px; fill:#fff">WhatsApp</text>
  <rect x="118" y="44" width="65" height="22" rx="6" fill="#0088cc"><title>Telegram</title></rect>
  <text x="125" y="60" style="font-size:10px; fill:#fff">Telegram</text>
  <rect x="191" y="44" width="50" height="22" rx="6" fill="#4A154B"><title>Slack</title></rect>
  <text x="200" y="60" style="font-size:10px; fill:#fff">Slack</text>
  <rect x="249" y="44" width="58" height="22" rx="6" fill="#5865F2"><title>Discord</title></rect>
  <text x="254" y="60" style="font-size:10px; fill:#fff">Discord</text>
  <rect x="315" y="44" width="52" height="22" rx="6" fill="#3a76f0"><title>Signal</title></rect>
  <text x="322" y="60" style="font-size:10px; fill:#fff">Signal</text>
  <rect x="375" y="44" width="65" height="22" rx="6" fill="#1a8917"><title>iMessage</title></rect>
  <text x="380" y="60" style="font-size:10px; fill:#fff">iMessage</text>
  <rect x="448" y="44" width="48" height="22" rx="6" fill="#334155"><title>Web</title></rect>
  <text x="457" y="60" style="font-size:10px; fill:#fff">Web</text>
  <rect x="504" y="44" width="72" height="22" rx="6" fill="#334155"><title>macOS/iOS</title></rect>
  <text x="509" y="60" style="font-size:10px; fill:#fff">macOS/iOS</text>

  <!-- Arrow -->
  <line x1="310" y1="76" x2="310" y2="100" stroke="#6366f1" stroke-width="2" marker-end="url(#aa)"/>

  <!-- Gateway -->
  <rect x="60" y="102" width="500" height="130" rx="12" fill="#1e1b4b" filter="url(#dsa)"/>
  <text x="210" y="126" style="font-size:15px; font-weight:700; fill:#fff">OpenClaw Gateway</text>
  <text x="210" y="144" style="font-size:10px; fill:#a5b4fc">ws://127.0.0.1:18789</text>

  <!-- Gateway components -->
  <rect x="85" y="158" width="100" height="34" rx="8" fill="#312e81"/>
  <text x="97" y="180" style="font-size:11px; fill:#c7d2fe">Session Mgmt</text>

  <rect x="200" y="158" width="110" height="34" rx="8" fill="#312e81"/>
  <text x="208" y="180" style="font-size:11px; fill:#c7d2fe">Channel Router</text>

  <rect x="325" y="158" width="100" height="34" rx="8" fill="#312e81"/>
  <text x="337" y="180" style="font-size:11px; fill:#c7d2fe">Tool Registry</text>

  <rect x="440" y="158" width="100" height="34" rx="8" fill="#312e81"/>
  <text x="455" y="180" style="font-size:11px; fill:#c7d2fe">Event Bus</text>

  <!-- Security badge -->
  <rect x="85" y="200" width="455" height="22" rx="4" fill="#fef3c7"/>
  <text x="180" y="216" style="font-size:10px; fill:#92400e; font-weight:600">Security: Pairing mode (default) — untrusted DMs blocked until approved</text>

  <!-- Arrow -->
  <line x1="310" y1="232" x2="310" y2="256" stroke="#6366f1" stroke-width="2" marker-end="url(#aa)"/>

  <!-- Agent Runtime -->
  <rect x="60" y="258" width="500" height="100" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.5" filter="url(#dsa)"/>
  <text x="210" y="282" style="font-size:13px; font-weight:700; fill:#1a1a2e">Agent Runtime (RPC mode)</text>

  <rect x="90" y="296" width="110" height="44" rx="8" fill="#6366f1" filter="url(#dsa)"/>
  <text x="113" y="316" style="font-size:12px; fill:#fff; font-weight:600">Agent 1</text>
  <text x="110" y="332" style="font-size:9px; fill:#c7d2fe">SOUL.md: assistant</text>

  <rect x="220" y="296" width="110" height="44" rx="8" fill="#ec4899" filter="url(#dsa)"/>
  <text x="243" y="316" style="font-size:12px; fill:#fff; font-weight:600">Agent 2</text>
  <text x="240" y="332" style="font-size:9px; fill:#fce7f3">SOUL.md: devops</text>

  <rect x="350" y="296" width="110" height="44" rx="8" fill="#f59e0b" filter="url(#dsa)"/>
  <text x="373" y="316" style="font-size:12px; fill:#fff; font-weight:600">Agent 3</text>
  <text x="370" y="332" style="font-size:9px; fill:#fef3c7">SOUL.md: mod</text>

  <!-- LLM label -->
  <rect x="60" y="372" width="500" height="32" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="170" y="393" style="font-size:12px; fill:#475569; font-weight:600">LLM Backend: Claude / GPT / DeepSeek (multi-model)</text>
</svg>