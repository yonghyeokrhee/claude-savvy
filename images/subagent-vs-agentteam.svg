<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="ds" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="aD" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6366f1"/></marker>
    <marker id="aU" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
  </defs>

  <rect width="720" height="310" rx="16" fill="#fafafa"/>

  <!-- Left: Sub-Agent -->
  <rect x="20" y="10" width="330" height="290" rx="14" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.5" filter="url(#ds)"/>
  <text x="105" y="40" style="font-size:15px; font-weight:700; fill:#1a1a2e">Sub-Agent Model</text>
  <text x="105" y="58" style="font-size:11px; fill:#666">One-way: results only go up</text>

  <!-- Main Claude -->
  <rect x="100" y="72" width="180" height="50" rx="10" fill="#6366f1" filter="url(#ds)"/>
  <text x="130" y="100" style="font-size:14px; fill:#fff; font-weight:600">Main Claude</text>

  <!-- Sub agents -->
  <rect x="50" y="190" width="80" height="44" rx="8" fill="#a5b4fc" filter="url(#ds)"/>
  <text x="68" y="216" style="font-size:13px; fill:#1e1b4b; font-weight:600">S1</text>
  <rect x="150" y="190" width="80" height="44" rx="8" fill="#a5b4fc" filter="url(#ds)"/>
  <text x="168" y="216" style="font-size:13px; fill:#1e1b4b; font-weight:600">S2</text>
  <rect x="250" y="190" width="80" height="44" rx="8" fill="#a5b4fc" filter="url(#ds)"/>
  <text x="268" y="216" style="font-size:13px; fill:#1e1b4b; font-weight:600">S3</text>

  <!-- Down arrows -->
  <line x1="145" y1="122" x2="90" y2="188" stroke="#6366f1" stroke-width="2" marker-end="url(#aD)"/>
  <line x1="190" y1="122" x2="190" y2="188" stroke="#6366f1" stroke-width="2" marker-end="url(#aD)"/>
  <line x1="235" y1="122" x2="290" y2="188" stroke="#6366f1" stroke-width="2" marker-end="url(#aD)"/>

  <!-- Up arrows (result) -->
  <line x1="95" y1="190" x2="150" y2="124" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#aU)"/>
  <line x1="195" y1="190" x2="195" y2="124" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#aU)"/>
  <line x1="285" y1="190" x2="230" y2="124" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#aU)"/>

  <text x="68" y="260" style="font-size:11px; fill:#6366f1">result</text>
  <text x="168" y="260" style="font-size:11px; fill:#6366f1">result</text>
  <text x="268" y="260" style="font-size:11px; fill:#6366f1">result</text>

  <!-- No lateral connection -->
  <line x1="130" y1="212" x2="150" y2="212" stroke="#e2e8f0" stroke-width="2"/>
  <text x="135" y="208" style="font-size:14px; fill:#e2e8f0">&#10007;</text>
  <line x1="230" y1="212" x2="250" y2="212" stroke="#e2e8f0" stroke-width="2"/>
  <text x="235" y="208" style="font-size:14px; fill:#e2e8f0">&#10007;</text>

  <text x="90" y="288" style="font-size:11px; fill:#888">No peer communication</text>

  <!-- Right: Agent Team -->
  <rect x="370" y="10" width="330" height="290" rx="14" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" filter="url(#ds)"/>
  <text x="460" y="40" style="font-size:15px; font-weight:700; fill:#1a1a2e">Agent Team Model</text>
  <text x="455" y="58" style="font-size:11px; fill:#666">Bi-directional: peers talk freely</text>

  <!-- Team Lead -->
  <rect x="450" y="72" width="180" height="50" rx="10" fill="#10b981" filter="url(#ds)"/>
  <text x="485" y="100" style="font-size:14px; fill:#fff; font-weight:600">Team Lead</text>

  <!-- Teammates -->
  <rect x="400" y="190" width="80" height="44" rx="8" fill="#6ee7b7" filter="url(#ds)"/>
  <text x="422" y="216" style="font-size:13px; fill:#064e3b; font-weight:600">T1</text>
  <rect x="500" y="190" width="80" height="44" rx="8" fill="#6ee7b7" filter="url(#ds)"/>
  <text x="522" y="216" style="font-size:13px; fill:#064e3b; font-weight:600">T2</text>
  <rect x="600" y="190" width="80" height="44" rx="8" fill="#6ee7b7" filter="url(#ds)"/>
  <text x="622" y="216" style="font-size:13px; fill:#064e3b; font-weight:600">T3</text>

  <!-- Bi-directional arrows lead <-> teammates -->
  <line x1="495" y1="122" x2="440" y2="188" stroke="#10b981" stroke-width="2" marker-end="url(#aG)"/>
  <line x1="445" y1="190" x2="500" y2="124" stroke="#10b981" stroke-width="1.5" marker-end="url(#aG)"/>
  <line x1="540" y1="122" x2="540" y2="188" stroke="#10b981" stroke-width="2" marker-end="url(#aG)"/>
  <line x1="545" y1="190" x2="545" y2="124" stroke="#10b981" stroke-width="1.5" marker-end="url(#aG)"/>
  <line x1="585" y1="122" x2="640" y2="188" stroke="#10b981" stroke-width="2" marker-end="url(#aG)"/>
  <line x1="635" y1="190" x2="580" y2="124" stroke="#10b981" stroke-width="1.5" marker-end="url(#aG)"/>

  <!-- Lateral peer connections -->
  <line x1="480" y1="210" x2="500" y2="210" stroke="#059669" stroke-width="2"/>
  <line x1="580" y1="210" x2="600" y2="210" stroke="#059669" stroke-width="2"/>
  <text x="486" y="206" style="font-size:12px; fill:#059669">&#8596;</text>
  <text x="586" y="206" style="font-size:12px; fill:#059669">&#8596;</text>

  <!-- Shared task list -->
  <rect x="420" y="250" width="240" height="30" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="460" y="270" style="font-size:12px; fill:#065f46; font-weight:600">Shared Task List</text>
</svg>