<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="ds4" x="-4%" y="-4%" width="108%" height="108%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ec4899"/></marker>
  </defs>
  <rect width="700" height="140" rx="14" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>

  <!-- Stage 1 -->
  <rect x="20" y="20" width="110" height="58" rx="10" fill="#ec4899" filter="url(#ds4)"/>
  <text x="32" y="44" style="font-size:12px; fill:#fff; font-weight:700">Requirements</text>
  <text x="42" y="62" style="font-size:10px; fill:#fce7f3">Agent 1</text>

  <line x1="130" y1="49" x2="150" y2="49" stroke="#ec4899" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Stage 2 -->
  <rect x="152" y="20" width="110" height="58" rx="10" fill="#f472b6" filter="url(#ds4)"/>
  <text x="178" y="44" style="font-size:12px; fill:#fff; font-weight:700">Design</text>
  <text x="174" y="62" style="font-size:10px; fill:#fce7f3">Agent 2</text>

  <line x1="262" y1="49" x2="282" y2="49" stroke="#ec4899" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Stage 3 -->
  <rect x="284" y="20" width="110" height="58" rx="10" fill="#f472b6" filter="url(#ds4)"/>
  <text x="312" y="44" style="font-size:12px; fill:#fff; font-weight:700">Coding</text>
  <text x="306" y="62" style="font-size:10px; fill:#fce7f3">Agent 3</text>

  <line x1="394" y1="49" x2="414" y2="49" stroke="#ec4899" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Stage 4 -->
  <rect x="416" y="20" width="110" height="58" rx="10" fill="#f472b6" filter="url(#ds4)"/>
  <text x="442" y="44" style="font-size:12px; fill:#fff; font-weight:700">Review</text>
  <text x="438" y="62" style="font-size:10px; fill:#fce7f3">Agent 4</text>

  <line x1="526" y1="49" x2="546" y2="49" stroke="#ec4899" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Stage 5 -->
  <rect x="548" y="20" width="130" height="58" rx="10" fill="#be185d" filter="url(#ds4)"/>
  <text x="580" y="44" style="font-size:12px; fill:#fff; font-weight:700">Testing</text>
  <text x="580" y="62" style="font-size:10px; fill:#fce7f3">Agent 5</text>

  <!-- Progress bar -->
  <rect x="20" y="96" width="658" height="8" rx="4" fill="#fce7f3"/>
  <rect x="20" y="96" width="658" height="8" rx="4" fill="url(#pgr)"/>
  <defs>
    <linearGradient id="pgr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
  </defs>

  <text x="200" y="126" style="font-size:11px; fill:#888">Sequential: each stage's output feeds the next (CI/CD-like)</text>
</svg>